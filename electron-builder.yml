appId: com.wipodev.app
productName: appName
copyright: "Copyright © 2026 wipodev"
directories:
  buildResources: build
  output: dist
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
# -------------------------------------------------------------------------
# SECCIÓN DE RECURSOS EXTERNOS (ASAR UNPACK)
# -------------------------------------------------------------------------
# Esta opción extrae físicamente los archivos de la carpeta 'resources'
# fuera del archivo comprimido .asar durante la compilación.
#
# ÚTIL PARA: Archivos que necesitan ser accedidos directamente por el
# sistema operativo o binarios (.exe, .sh, drivers) que no pueden
# ejecutarse desde dentro de un ASAR.
#
# NOTA: Se mantiene comentado para evitar duplicados innecesarios (iconos).
#
# asarUnpack:
#   - "resources/**"
# -------------------------------------------------------------------------
win:
  executableName: appName
  icon: resources/icon.ico
nsis:
  installerIcon: resources/icon_installer.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: wipodev <wipodev28@gmail.com>
  category: Template;Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://wipodev.com
